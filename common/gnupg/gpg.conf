#####################
# Options for GnuPG #
#####################

# TODO Place default-key HERE (format: 0x...)
#default-key 

# Settings

armor
charset utf-8
with-fingerprint
no-greeting
no-emit-version
fixed-list-mode
keyid-format 0xlong
verify-options show-uid-validity
list-options show-uid-validity
require-cross-certification
use-agent

# Algos

personal-digest-preferences SHA512 SHA384 SHA256 SHA224 AES256 AES192 AES CAST5 BZIP2 ZLIB ZIP Uncompressed
cert-digest-algo SHA256
default-preference-list SHA512 SHA384 SHA256 SHA224 AES256 AES192 AES CAST5 ZLIB BZIP2 ZIP Uncompressed

# Keyserver (Updated for Modern Standards)
# OpenPGP Keyserver - modern, well-maintained, no deprecated infrastructure
keyserver hkps://keys.openpgp.org
keyserver-options no-honor-keyserver-url
keyserver-options include-revoked

# Keyserver Options Documentation
# - no-honor-keyserver-url: Prevents keyserver preference overrides
# - include-revoked: Shows revoked keys (helps identify compromised keys)
#
# Alternative keyservers (for reference):
#   hkps://keys.mailvelope.com (Mailvelope's server)
#   hkps://keys.github.com (GitHub's PGP keyserver)
