# Directory Manager Configuration for GnuPG
# Updated for modern OpenPGP keyserver

# Keyserver Configuration
# Uses OpenPGP Keyserver (https://keys.openpgp.org) - modern and well-maintained
# The corresponding CA certificate configuration is no longer needed as this
# keyserver uses standard HTTPS with system CA bundles

# Optional: Add proxy settings if needed
# hkp-cacert $HOME/.gnupg/openpgp-keys.netCA.pem

# Dirmngr will handle HTTPS connections to keys.openpgp.org using
# the system's standard certificate authority bundles (Ubuntu 24.04+)

# If behind a corporate proxy, uncomment and configure:
#http-proxy 127.0.0.1:3128
#https-proxy 127.0.0.1:3128
