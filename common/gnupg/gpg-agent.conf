# GPG Agent Configuration
# Updated for Ubuntu 24.04 LTS and Raspberry Pi OS Bookworm

# Pinentry Program Selection
# Choose one based on your system:

# Linux Desktop (GUI) - recommended for most systems
pinentry-program /usr/bin/pinentry-gtk-2

# Linux Terminal/SSH - fallback for headless systems
#pinentry-program /usr/bin/pinentry-curses

# Raspberry Pi OS (Bookworm) - if on Raspberry Pi
#pinentry-program /usr/bin/pinentry-tty

# Cache TTL settings (in seconds)
# default-cache-ttl: TTL for cached passphrases (default: 600s = 10min)
# max-cache-ttl: Maximum allowed TTL before re-entry (default: 7200s = 2hrs)
default-cache-ttl 600
max-cache-ttl 7200

# SSH support (uncomment to enable SSH key management via gpg-agent)
#enable-ssh-support

# SSH cache TTL (if SSH support enabled)
#default-cache-ttl-ssh 1800
#max-cache-ttl-ssh 7200
